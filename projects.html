<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Davi Barroso</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="project.css" />
  <script src="i18n.js"></script>
  <style>
    /* ─── Projects page specific ─── */
    .projects-hero {
      padding: clamp(48px, 6vw, 80px) clamp(24px, 4vw, 56px) clamp(32px, 4vw, 56px);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      position: relative;
      z-index: 1;
    }

    .projects-hero .section-eyebrow {
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.3s;
    }

    .projects-hero .section-title {
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    .projects-hero .section-title { margin-bottom: 0; }

    /* Tag filter bar */
    .filter-bar {
      padding: 24px clamp(24px, 4vw, 56px);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      display: flex;
      gap: 28px;
      align-items: flex-start;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.6s;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .filter-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-light);
      opacity: 0.5;
    }

    .filter-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-tag {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-light);
      padding: 5px 12px;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 100px;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      user-select: none;
    }

    .filter-tag:hover,
    .filter-tag.active {
      color: var(--ink);
      background: var(--ink);
      color: var(--white);
      border-color: var(--ink);
    }

    /* Project grid */
    .projects-grid-wrap {
      padding: clamp(32px, 4vw, 56px) clamp(24px, 4vw, 56px);
      position: relative;
      z-index: 1;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(560px, 1fr));
      gap: 20px;
    }

    .project-card-grid {
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(8px);
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .project-card-grid:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.1);
    }

    .project-card-grid .project-card-top {
      height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .project-card-grid .project-card-body {
      padding: 20px 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .project-metrics {
      display: flex;
      gap: 16px;
      padding-top: 4px;
      border-top: 1px solid rgba(0,0,0,0.06);
      margin-top: 4px;
    }

    .metric {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .metric-value {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .metric-label {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      .projects-grid { grid-template-columns: 1fr; }
      .filter-bar { gap: 20px; }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <script src="navbar.js"></script>

  <div class="projects-hero">
    <p class="section-eyebrow" data-i18n="projects.eyebrow">Projects</p>
    <h1 class="section-title" data-i18n-html="projects.title">All <em>work</em></h1>
  </div>

  <div class="filter-bar">
    <div class="filter-group">
      <span class="filter-label" data-i18n="filter.type">Type</span>
      <div class="filter-tags">
        <span class="filter-tag active" data-i18n="filter.all">All</span>
        <span class="filter-tag">Data Analysis</span>
        <span class="filter-tag">Data Engineering</span>
        <span class="filter-tag">Visualization</span>
        <span class="filter-tag">Automation</span>
      </div>
    </div>
    <div class="filter-group">
      <span class="filter-label" data-i18n="filter.tool">Tool</span>
      <div class="filter-tags">
        <span class="filter-tag">Python</span>
        <span class="filter-tag">SQL</span>
        <span class="filter-tag">Power BI</span>
        <span class="filter-tag">Tableau</span>
        <span class="filter-tag">dbt</span>
        <span class="filter-tag">n8n</span>
        <span class="filter-tag">React</span>
      </div>
    </div>
  </div>

  <div class="projects-grid-wrap">
    <div class="projects-grid">

    </div>
  </div>

  <script src="project-loader.js"></script>
</body>
</html>
