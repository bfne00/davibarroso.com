<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Davi Barroso — Data Analyst</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --off-white: #f7f6f3;
      --ink: #111110;
      --ink-light: #555550;
      --accent: #2563eb;
      --accent-2: #7c3aed;
      --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    }

    html, body {
      height: 100%;
      background: var(--off-white);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: var(--grain);
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    /* Gradient blob */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: var(--accent);
      top: -100px; right: -100px;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: var(--accent-2);
      bottom: -100px; left: -80px;
      animation-delay: -4s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* Layout */
    .page {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(24px, 4vw, 56px);
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(18px, 2.5vw, 24px);
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-light);
      padding: 6px 14px;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 100px;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Main */
    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 32px;
      max-width: 780px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-light);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    .headline {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(52px, 8vw, 110px);
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--ink);
      opacity: 0;
      animation: fadeUp 0.9s ease forwards 0.7s;
    }

    .headline em {
      font-style: italic;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .description {
      font-size: clamp(13px, 1.4vw, 15px);
      line-height: 1.7;
      color: var(--ink-light);
      max-width: 480px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.95s;
    }

    .cta-row {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.15s;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: var(--ink);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 100px;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .btn-primary:hover {
      background: var(--accent);
      transform: translateY(-2px);
    }
    .btn-primary svg { transition: transform 0.2s ease; }
    .btn-primary:hover svg { transform: translateX(3px); }

    .linkedin-link {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-light);
      text-decoration: none;
      border-bottom: 1px solid currentColor;
      padding-bottom: 2px;
      transition: color 0.2s ease;
    }
    .linkedin-link:hover { color: var(--accent); }

    /* Footer */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.4s;
    }

    .stack-list {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-light);
      padding: 5px 10px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 4px;
      background: rgba(255,255,255,0.5);
    }

    .location {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--ink-light);
      text-align: right;
    }

    /* Line divider */
    .divider {
      width: 48px;
      height: 1px;
      background: var(--ink);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.85s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .headline { font-size: clamp(42px, 13vw, 72px); }
      footer { flex-direction: column; gap: 16px; align-items: flex-start; }
      .location { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="page">
    <header>
      <div class="logo">Davi Barroso</div>
      <div class="status-pill">
        <span class="dot"></span>
        Building something
      </div>
    </header>

    <main>
      <p class="eyebrow">Portfolio — Coming Soon</p>
      <h1 class="headline">Data<br><em>Analyst</em><br>& BI</h1>
      <div class="divider"></div>
      <p class="description">
        Analytics infrastructure, data visualization, and workflow automation.
        Turning fragmented business data into decisions that stick.
      </p>
      <div class="cta-row">
        <a href="mailto:bfne00@gmail.com" class="btn-primary">
          Get in touch
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7h10M7 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <a href="https://linkedin.com/in/davibb" class="linkedin-link" target="_blank">
          LinkedIn ↗
        </a>
      </div>
    </main>

    <footer>
      <div class="stack-list">
        <span class="tag">SQL</span>
        <span class="tag">Power BI</span>
        <span class="tag">Python</span>
        <span class="tag">Tableau</span>
        <span class="tag">React</span>
      </div>
      <div class="location">
        Curitiba, Brasil<br>Open to remote
      </div>
    </footer>
  </div>
</body>
</html>
